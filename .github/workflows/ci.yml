name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install bankstatementparser (from PyPI) + this package
        run: |
          python -m pip install --upgrade pip
          REF="${{ github.head_ref || github.ref_name }}"
          if [[ "$REF" == feat/* ]]; then
            pip install "bankstatementparser @ git+https://github.com/sebastienrousseau/bankstatementparser@${REF}"
          else
            pip install "bankstatementparser>=0.0.9"
          fi
          pip install -e .
          pip install pytest pytest-cov interrogate

      - name: Run tests with the 100% coverage gate
        run: |
          pytest tests/ \
            --cov=bankstatementparser_lsp --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=100 -v

      - name: Enforce 100% docstring coverage
        run: interrogate -c pyproject.toml bankstatementparser_lsp

      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install bankstatementparser (from PyPI) + this package
        run: |
          python -m pip install --upgrade pip
          REF="${{ github.head_ref || github.ref_name }}"
          if [[ "$REF" == feat/* ]]; then
            pip install "bankstatementparser @ git+https://github.com/sebastienrousseau/bankstatementparser@${REF}"
          else
            pip install "bankstatementparser>=0.0.9"
          fi
          pip install -e .
          pip install ruff black mypy types-jsonschema

      - name: Ruff check
        run: ruff check bankstatementparser_lsp/ tests/

      - name: Black check
        run: black --check bankstatementparser_lsp/ tests/

      - name: Mypy
        run: mypy bankstatementparser_lsp/

  examples:
    name: Examples
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install bankstatementparser (from PyPI) + this package
        run: |
          python -m pip install --upgrade pip
          REF="${{ github.head_ref || github.ref_name }}"
          if [[ "$REF" == feat/* ]]; then
            pip install "bankstatementparser @ git+https://github.com/sebastienrousseau/bankstatementparser@${REF}"
          else
            pip install "bankstatementparser>=0.0.9"
          fi
          pip install -e .

      - name: Run examples
        run: |
          python examples/01_lsp_helpers.py
          python examples/02_severity_filtering.py
          python examples/03_lsp_conversion.py
